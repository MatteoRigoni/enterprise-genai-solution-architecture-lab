name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore AiSa.sln

      - name: Build
        run: dotnet build AiSa.sln -c Release --no-restore

      - name: Test
        run: dotnet test AiSa.sln -c Release --no-build --verbosity normal

      - name: Start API (CI eval stub)
        env:
          AISA_CI_EVAL: "1"
          ASPNETCORE_ENVIRONMENT: Production
          ASPNETCORE_URLS: http://127.0.0.1:5057
        run: |
          dotnet run --project src/AiSa.Host/AiSa.Host.csproj -c Release --no-build &
          echo $! > /tmp/aisa-host.pid
          for i in $(seq 1 90); do
            if curl -fsS -o /dev/null http://127.0.0.1:5057/ 2>/dev/null; then
              echo "Host is up"
              exit 0
            fi
            sleep 1
          done
          echo "Host failed to start in time"
          exit 1

      - name: Eval smoke
        run: |
          dotnet run --project src/AiSa.EvalRunner/AiSa.EvalRunner.csproj -c Release --no-build -- \
            --dataset eval/datasets/smoke.json \
            --base-url http://127.0.0.1:5057 \
            --output eval/reports/ci-smoke \
            --min-answered-rate 0.8 \
            --min-citation-presence-rate 0.8

      - name: Stop API
        if: always()
        run: |
          if [ -f /tmp/aisa-host.pid ]; then kill "$(cat /tmp/aisa-host.pid)" || true; fi

      - name: Upload eval smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-smoke-report
          path: eval/reports/ci-smoke/*.json
          if-no-files-found: warn
